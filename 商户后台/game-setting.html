<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏设置 - API ADMIN</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div id="app" class="admin-layout">
    <script src="sidebar.js"></script>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="collapse-btn">☰</div>
          <div class="breadcrumb"><span>游戏配置</span><span>/</span><strong>游戏设置</strong></div>
        </div>
        <div class="topbar-right">
          <span class="top-icon">↻</span>
          <span class="top-icon">A</span>
          <span class="time" data-current-time></span>
          <select class="account-input timezone" aria-label="时区">
            <option>+05:30</option>
            <option>+08:00</option>
            <option>UTC</option>
          </select>
          <span class="account">ar518888</span>
          <span class="top-icon">⌄</span>
        </div>
      </header>

      <section class="content game-setting-page">
        <div class="game-setting-shell">
          <div class="game-setting-tabs" role="tablist" aria-label="游戏平台">
            <button class="game-setting-tab active" type="button">GameBox</button>
            <button class="game-setting-tab" type="button">SPRIBE</button>
            <button class="game-setting-tab" type="button">PG</button>
            <button class="game-setting-tab" type="button">PP</button>
            <button class="game-setting-tab" type="button">JILI</button>
            <button class="game-setting-tab" type="button">TADA</button>
            <button class="game-setting-tab" type="button">InOut</button>
          </div>

          <div class="game-setting-toolbar">
            <label class="game-setting-filter">
              <span>游戏选择</span>
              <div class="game-picker game-setting-game-picker" data-game-picker>
                <button class="game-picker-trigger" type="button" data-game-trigger>
                  <span class="game-choice-icon">ALL</span>
                  <span data-game-label>全部游戏</span>
                  <span class="game-picker-arrow">⌄</span>
                </button>
                <div class="game-picker-panel" data-game-panel hidden>
                  <div class="game-brand-tabs" data-game-brand-tabs>
                    <button class="game-brand-tab active" type="button" data-game-brand value="">全部品牌</button>
                    <button class="game-brand-tab" type="button" data-game-brand value="GameBox">GameBox</button>
                    <button class="game-brand-tab" type="button" data-game-brand value="SPRIBE">SPRIBE</button>
                    <button class="game-brand-tab" type="button" data-game-brand value="PG">PG</button>
                    <button class="game-brand-tab" type="button" data-game-brand value="PP">PP</button>
                    <button class="game-brand-tab" type="button" data-game-brand value="JILI">JILI</button>
                  </div>
                  <input class="game-search" type="text" placeholder="搜索游戏名称 / 英文名 / 游戏ID" data-game-search />
                  <div class="game-options" data-game-options>
                    <button class="game-option" type="button" data-game-option data-brand="GameBox" data-id="10001" data-value="10001" data-name="Roulette" data-icon="R" title="Roulette"><span class="game-thumb crown"><span>R</span></span></button>
                    <button class="game-option" type="button" data-game-option data-brand="GameBox" data-id="10003" data-value="10003" data-name="PowerOfTheKraken" data-icon="K" title="PowerOfTheKraken"><span class="game-thumb kraken"><span>K</span></span></button>
                  </div>
                  <div class="game-picker-pager">
                    <button class="game-page-btn" type="button" data-game-prev>‹</button>
                    <span class="game-page-info" data-game-page-info>1 / 1</span>
                    <button class="game-page-btn" type="button" data-game-next>›</button>
                  </div>
                </div>
              </div>
            </label>
            <div class="game-setting-actions">
              <button class="game-setting-btn query" type="button" data-query>⌕ 查询</button>
              <button class="game-setting-btn reset" type="button" data-reset>重置</button>
            </div>
          </div>

          <div class="game-setting-bulk">
            <button class="game-setting-btn open-all" type="button">开启所有游戏</button>
            <button class="game-setting-btn maintain-all" type="button">维护所有游戏</button>
            <button class="game-setting-btn batch-rtp" type="button" data-batch-rtp-open>批量设置RTP</button>
          </div>

          <div class="game-setting-table-wrap">
            <div class="game-setting-table">
              <div class="game-setting-row header">
                <div><span class="game-setting-help">?</span>游戏ID</div>
                <div><span class="game-setting-help">?</span>中文名称</div>
                <div><span class="game-setting-help">?</span>英文名称</div>
                <div><span class="game-setting-help">?</span>维护状态</div>
                <div><span class="game-setting-help">?</span>RTP</div>
                <div><span class="game-setting-help">?</span>游戏状态</div>
                <div>操作</div>
              </div>
              <div class="game-setting-row" data-game-row data-game-id="10001">
                <div>10001</div>
                <div>Roulette</div>
                <div>Roulette</div>
                <div><span class="game-setting-status maintenance">维护中</span></div>
                <div>100%</div>
                <div><button class="game-toggle closed" type="button" data-toggle>关闭游戏</button></div>
                <div class="game-setting-row-actions">
                  <button class="game-setting-btn view" type="button">查看</button>
                  <button class="game-setting-btn edit" type="button">编辑</button>
                </div>
              </div>
              <div class="game-setting-row" data-game-row data-game-id="10003">
                <div>10003</div>
                <div>PowerOfTheKraken</div>
                <div>PowerOfTheKraken</div>
                <div><span class="game-setting-status normal">正常</span></div>
                <div>97%</div>
                <div><button class="game-toggle open" type="button" data-toggle>开启游戏</button></div>
                <div class="game-setting-row-actions">
                  <button class="game-setting-btn view" type="button">查看</button>
                  <button class="game-setting-btn edit" type="button">编辑</button>
                </div>
              </div>
            </div>
          </div>

          <div class="game-setting-pagination">
            <span>共 2 条</span>
            <select class="game-setting-page-size" aria-label="每页条数">
              <option>20条/页</option>
              <option>50条/页</option>
              <option>100条/页</option>
            </select>
            <button class="game-setting-page-btn" type="button" disabled>‹</button>
            <button class="game-setting-page-btn active" type="button">1</button>
            <button class="game-setting-page-btn" type="button" disabled>›</button>
            <span>前往</span>
            <input class="game-setting-jump" type="text" value="1" aria-label="跳转页码" />
            <span>页</span>
          </div>
        </div>
      </section>
    </main>

    <div class="rtp-modal-mask" data-rtp-modal hidden>
      <section class="rtp-modal" role="dialog" aria-modal="true" aria-labelledby="rtp-modal-title">
        <div class="rtp-modal-head">
          <div>
            <h3 id="rtp-modal-title">批量设置RTP</h3>
            <p>统一调整当前筛选范围内游戏的 RTP 档位和玩家限制参数。</p>
          </div>
          <button class="rtp-modal-close" type="button" data-rtp-close aria-label="关闭">×</button>
        </div>
        <form class="rtp-modal-body" data-rtp-form>
          <label class="rtp-form-row">
            <span class="rtp-form-label">RTP档位选择</span>
            <select class="rtp-form-control" data-rtp-level>
              <option value="97">97%</option>
              <option value="95">95%</option>
              <option value="90">90%</option>
              <option value="85">85%</option>
            </select>
          </label>
          <label class="rtp-form-row">
            <span class="rtp-form-label">单局个人赢取最高倍数</span>
            <input class="rtp-form-control" data-rtp-multiple type="number" min="1" max="10000" value="1" />
            <em>单局最大赢钱倍数可设置1~10000</em>
          </label>
          <label class="rtp-form-row">
            <span class="rtp-form-label">单局个人赢取最高钱数</span>
            <input class="rtp-form-control" data-rtp-money type="number" min="1" max="100000000" placeholder="单局个人赢取最高钱数" />
            <em>单局最大赢钱数可设置区间1~100,000,000</em>
          </label>
          <div class="rtp-modal-actions">
            <button class="rtp-modal-btn reset" type="button" data-rtp-reset>重置</button>
            <button class="rtp-modal-btn confirm" type="submit">确定</button>
          </div>
        </form>
      </section>
    </div>
  </div>

  <script>
    (() => {
      const picker = document.querySelector("[data-game-picker]");
      const trigger = document.querySelector("[data-game-trigger]");
      const panel = document.querySelector("[data-game-panel]");
      const gameLabel = document.querySelector("[data-game-label]");
      const gameSearch = document.querySelector("[data-game-search]");
      const gameBrandTabs = Array.from(document.querySelectorAll("[data-game-brand]"));
      const gameOptions = Array.from(document.querySelectorAll("[data-game-option]"));
      const gamePrev = document.querySelector("[data-game-prev]");
      const gameNext = document.querySelector("[data-game-next]");
      const gamePageInfo = document.querySelector("[data-game-page-info]");
      const rows = Array.from(document.querySelectorAll("[data-game-row]"));
      const rtpModal = document.querySelector("[data-rtp-modal]");
      const rtpForm = document.querySelector("[data-rtp-form]");
      const rtpLevel = document.querySelector("[data-rtp-level]");
      const rtpMultiple = document.querySelector("[data-rtp-multiple]");
      const rtpMoney = document.querySelector("[data-rtp-money]");
      const pageSize = 8;
      let selectedGame = "";
      let selectedBrand = "";
      let gamePage = 1;
      let filteredGameOptions = gameOptions;

      document.querySelectorAll(".game-setting-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".game-setting-tab").forEach((item) => item.classList.remove("active"));
          tab.classList.add("active");
        });
      });

      function positionGamePanel() {
        if (panel.hidden) return;
        const triggerRect = trigger.getBoundingClientRect();
        const sidebar = document.querySelector(".sidebar");
        const sidebarRect = sidebar ? sidebar.getBoundingClientRect() : { right: 0, bottom: 0 };
        const isStackedLayout = window.matchMedia("(max-width: 820px)").matches;
        const leftLimit = isStackedLayout ? 16 : Math.max(16, sidebarRect.right + 16);
        const rightLimit = window.innerWidth - 24;
        const topLimit = isStackedLayout ? Math.max(16, sidebarRect.bottom + 12) : 72;
        const panelWidth = Math.max(280, Math.min(760, rightLimit - leftLimit));
        let panelLeft = triggerRect.left;
        if (panelLeft + panelWidth > rightLimit) panelLeft = rightLimit - panelWidth;
        if (panelLeft < leftLimit) panelLeft = leftLimit;
        let panelTop = triggerRect.bottom + 8;
        if (panelTop < topLimit) panelTop = topLimit;
        panel.style.left = `${panelLeft}px`;
        panel.style.top = `${panelTop}px`;
        panel.style.width = `${panelWidth}px`;
        panel.style.maxHeight = `${Math.max(260, window.innerHeight - panelTop - 18)}px`;
      }

      function selectedBrandGameValues() {
        if (!selectedBrand) return [];
        return gameOptions.filter((item) => item.dataset.brand === selectedBrand).map((item) => item.dataset.value);
      }

      function updateBrandGameLabel() {
        if (selectedGame) return;
        trigger.querySelector(".game-choice-icon").textContent = selectedBrand || "ALL";
        gameLabel.textContent = selectedBrand ? `${selectedBrand} 全部游戏` : "全部游戏";
      }

      function applyFilter() {
        const brandGames = selectedBrandGameValues();
        rows.forEach((row) => {
          row.hidden = selectedGame
            ? row.dataset.gameId !== selectedGame
            : Boolean(selectedBrand && !brandGames.includes(row.dataset.gameId));
        });
      }

      function renderGamePage() {
        const totalPages = Math.max(1, Math.ceil(filteredGameOptions.length / pageSize));
        gamePage = Math.min(gamePage, totalPages);
        const start = (gamePage - 1) * pageSize;
        const visibleSet = new Set(filteredGameOptions.slice(start, start + pageSize));
        gameOptions.forEach((option) => {
          option.hidden = !visibleSet.has(option);
        });
        gamePageInfo.textContent = `${gamePage} / ${totalPages}`;
        gamePrev.disabled = gamePage <= 1;
        gameNext.disabled = gamePage >= totalPages;
        positionGamePanel();
      }

      function filterGameOptions() {
        const keyword = gameSearch.value.trim().toLowerCase();
        filteredGameOptions = gameOptions.filter((option) => {
          const gameName = option.dataset.name.toLowerCase();
          const gameId = (option.dataset.id || "").toLowerCase();
          const gameValue = (option.dataset.value || "").toLowerCase();
          const matchBrand = !selectedBrand || option.dataset.brand === selectedBrand;
          const matchKeyword = gameName.includes(keyword) || gameId.includes(keyword) || gameValue.includes(keyword);
          return matchBrand && matchKeyword;
        });
        gamePage = 1;
        renderGamePage();
      }

      gameBrandTabs.forEach((tab) => {
        if (!tab.querySelector(".game-brand-tab-check")) {
          const label = tab.textContent.trim();
          tab.textContent = "";
          const check = document.createElement("span");
          check.className = "game-brand-tab-check";
          check.setAttribute("aria-hidden", "true");
          const text = document.createElement("span");
          text.className = "game-brand-tab-label";
          text.textContent = label;
          tab.append(check, text);
        }
        tab.addEventListener("click", (event) => {
          if (!event.target.closest(".game-brand-tab-check")) return;
          const shouldClearBrand = tab.value && tab.classList.contains("active");
          selectedBrand = shouldClearBrand ? "" : tab.value;
          if (selectedBrand) {
            selectedGame = "";
            gameOptions.forEach((item) => item.classList.remove("active"));
          }
          gameBrandTabs.forEach((item) => {
            const isActive = selectedBrand ? item === tab : item.value === "";
            item.classList.toggle("active", isActive);
          });
          filterGameOptions();
          updateBrandGameLabel();
          applyFilter();
        });
      });

      trigger.addEventListener("click", () => {
        panel.hidden = !panel.hidden;
        if (!panel.hidden) {
          renderGamePage();
          positionGamePanel();
          gameSearch.focus();
        }
      });

      gameSearch.addEventListener("input", filterGameOptions);
      gamePrev.addEventListener("click", () => {
        gamePage -= 1;
        renderGamePage();
      });
      gameNext.addEventListener("click", () => {
        gamePage += 1;
        renderGamePage();
      });
      gameOptions.forEach((option) => {
        option.addEventListener("click", () => {
          selectedGame = option.dataset.value;
          gameLabel.textContent = option.dataset.name;
          trigger.querySelector(".game-choice-icon").textContent = option.dataset.icon;
          gameOptions.forEach((item) => item.classList.toggle("active", item === option));
          panel.hidden = true;
          gameSearch.value = "";
          gamePage = 1;
          renderGamePage();
          applyFilter();
        });
      });

      document.querySelector("[data-query]").addEventListener("click", applyFilter);
      document.querySelector("[data-reset]").addEventListener("click", () => {
        selectedGame = "";
        selectedBrand = "";
        gameLabel.textContent = "全部游戏";
        trigger.querySelector(".game-choice-icon").textContent = "ALL";
        gameOptions.forEach((item) => item.classList.remove("active"));
        gameBrandTabs.forEach((item) => item.classList.toggle("active", item.value === ""));
        gameSearch.value = "";
        filteredGameOptions = gameOptions;
        gamePage = 1;
        renderGamePage();
        applyFilter();
      });

      function resetRtpForm() {
        rtpLevel.value = "97";
        rtpMultiple.value = "1";
        rtpMoney.value = "";
      }

      function openRtpModal() {
        resetRtpForm();
        rtpModal.hidden = false;
        document.body.classList.add("modal-open");
        rtpLevel.focus();
      }

      function closeRtpModal() {
        rtpModal.hidden = true;
        document.body.classList.remove("modal-open");
      }

      document.querySelector("[data-batch-rtp-open]").addEventListener("click", openRtpModal);
      document.querySelector("[data-rtp-close]").addEventListener("click", closeRtpModal);
      document.querySelector("[data-rtp-reset]").addEventListener("click", resetRtpForm);
      rtpModal.addEventListener("click", (event) => {
        if (event.target === rtpModal) closeRtpModal();
      });
      rtpForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const multiple = Number(rtpMultiple.value);
        const money = Number(rtpMoney.value);
        if (!Number.isFinite(multiple) || multiple < 1 || multiple > 10000) {
          rtpMultiple.focus();
          return;
        }
        if (!Number.isFinite(money) || money < 1 || money > 100000000) {
          rtpMoney.focus();
          return;
        }
        closeRtpModal();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !rtpModal.hidden) closeRtpModal();
      });
      document.addEventListener("click", (event) => {
        if (!picker.contains(event.target)) panel.hidden = true;
      });
      window.addEventListener("resize", positionGamePanel);
      window.addEventListener("scroll", positionGamePanel, true);

      document.querySelectorAll("[data-toggle]").forEach((button) => {
        button.addEventListener("click", () => {
          const isOpen = button.classList.toggle("open");
          button.classList.toggle("closed", !isOpen);
          button.textContent = isOpen ? "开启游戏" : "关闭游戏";
        });
      });
    })();
  </script>
  <script src="common.js"></script>
</body>
</html>
