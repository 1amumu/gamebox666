<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>操作日志 - API ADMIN</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.8.4/dist/index.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-layout">
    <script src="sidebar.js"></script>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left"><div class="collapse-btn">☰</div><div class="breadcrumb"><span>系统管理</span><span>/</span><strong>操作日志</strong></div></div>
        <div class="topbar-right"><span class="top-icon">↗</span><span class="top-icon">A</span><span class="time" data-current-time></span><select class="el-select__wrapper timezone"><option>+05:30</option><option>+08:00</option><option>UTC</option></select><span class="account">ar518888</span><span class="top-icon">⌄</span></div>
      </header>
      <section class="content system-page">
        <div class="system-tabs">
          <a class="system-tab" href="system-account.html">账户管理</a>
          <a class="system-tab" href="system-role.html">角色管理</a>
          <a class="system-tab active" href="system-operation-log.html">操作日志</a>
        </div>

        <section class="system-card">
          <div class="system-card-head">
            <div>
              <h2>后台操作日志</h2>
              <p>记录每一个后台管理员在后台的操作行为，涉及修改的动作展示变更内容，并保留登录 IP 与操作 IP。</p>
            </div>
            <button class="profit-btn" type="button" data-export-log>导出日志</button>
          </div>
          <div class="system-toolbar operation-log-toolbar">
            <label class="system-filter"><span>管理员</span><input class="account-input" type="text" placeholder="账号 / 姓名" data-log-admin /></label>
            <label class="system-filter"><span>操作类型</span><select class="account-input account-select" data-log-type><option value="">全部类型</option><option>登录</option><option>新增</option><option>修改</option><option>删除</option><option>启停</option><option>导出</option></select></label>
            <label class="system-filter"><span>模块</span><select class="account-input account-select" data-log-module><option value="">全部模块</option><option>玩家账号</option><option>游戏配置</option><option>API配置</option><option>商户报表</option><option>系统管理</option></select></label>
            <label class="system-filter"><span>登录IP</span><input class="account-input" type="text" placeholder="请输入登录IP" data-log-ip /></label>
            <label class="system-filter log-date-filter">
              <span>操作时间</span>
              <input class="profit-input date" type="date" value="2026-05-06" data-log-from />
              <span class="profit-date-range-sep">至</span>
              <input class="profit-input date" type="date" value="2026-05-11" data-log-to />
            </label>
            <div class="system-actions"><button class="profit-btn primary" type="button" data-log-search>查询</button><button class="profit-btn" type="button" data-log-reset>重置</button></div>
          </div>
          <div class="system-table-wrap">
            <div class="operation-log-table" data-log-table>
              <div class="system-row operation-log header">
                <div>管理员</div><div>角色</div><div>操作类型</div><div>操作模块</div><div>操作对象</div><div>修改内容</div><div>登录IP</div><div>操作IP</div><div>操作时间</div><div>结果</div>
              </div>
            </div>
          </div>
          <div class="profit-pagination system-pagination">
            <div>共 <span data-log-total>0</span> 条</div>
            <div class="profit-pages"><div class="profit-page-btn disabled">‹</div><div class="profit-page-btn active">1</div><div class="profit-page-btn disabled">›</div></div>
          </div>
        </section>
      </section>
    </main>
  </div>
  <script src="common.js"></script>
  <script>
    const logs = [
      { admin: "admin", name: "主管理员", role: "超级管理员", type: "登录", module: "系统管理", target: "后台登录", change: "登录成功", loginIp: "103.48.12.16", actionIp: "103.48.12.16", time: "2026-05-11 11:18:28", date: "2026-05-11", result: "成功" },
      { admin: "ops_chen", name: "陈运营", role: "运营管理员", type: "修改", module: "玩家账号", target: "会员 10470001344450", change: "账号状态：在线 -> 封禁", loginIp: "172.21.8.90", actionIp: "172.21.8.90", time: "2026-05-11 10:46:12", date: "2026-05-11", result: "成功" },
      { admin: "ops_chen", name: "陈运营", role: "运营管理员", type: "修改", module: "游戏配置", target: "PowerOfTheKraken 点控", change: "控制状态：正常 -> 点控中；返奖倍数：1.00x -> 1.20x", loginIp: "172.21.8.90", actionIp: "172.21.8.90", time: "2026-05-11 10:31:04", date: "2026-05-11", result: "成功" },
      { admin: "finance_lin", name: "林财务", role: "财务管理员", type: "导出", module: "商户报表", target: "平台盈亏报表", change: "导出 2026-05-01 至 2026-05-10 数据", loginIp: "61.144.22.8", actionIp: "61.144.22.8", time: "2026-05-10 18:16:40", date: "2026-05-10", result: "成功" },
      { admin: "admin", name: "主管理员", role: "超级管理员", type: "新增", module: "系统管理", target: "管理员 ops_chen", change: "新增账号；绑定角色：运营管理员", loginIp: "103.48.12.16", actionIp: "103.48.12.16", time: "2026-05-10 14:22:33", date: "2026-05-10", result: "成功" },
      { admin: "admin", name: "主管理员", role: "超级管理员", type: "修改", module: "系统管理", target: "角色 财务管理员", change: "权限：增加 商户报表查看、财务明细导出", loginIp: "103.48.12.16", actionIp: "103.48.12.16", time: "2026-05-10 13:04:21", date: "2026-05-10", result: "成功" },
      { admin: "audit_read", name: "审计查看", role: "只读审计", type: "登录", module: "系统管理", target: "后台登录", change: "密码错误", loginIp: "38.54.102.17", actionIp: "38.54.102.17", time: "2026-05-09 20:45:08", date: "2026-05-09", result: "失败" },
      { admin: "admin", name: "主管理员", role: "超级管理员", type: "启停", module: "系统管理", target: "管理员 audit_read", change: "状态：启用 -> 停用", loginIp: "103.48.12.16", actionIp: "103.48.12.16", time: "2026-05-09 19:02:55", date: "2026-05-09", result: "成功" },
      { admin: "ops_chen", name: "陈运营", role: "运营管理员", type: "修改", module: "API配置", target: "回调地址", change: "URL：https://old.example/callback -> https://api.example/callback", loginIp: "172.21.8.90", actionIp: "172.21.8.90", time: "2026-05-08 16:11:37", date: "2026-05-08", result: "成功" },
      { admin: "admin", name: "主管理员", role: "超级管理员", type: "删除", module: "系统管理", target: "角色 临时测试", change: "删除角色；影响账号：0", loginIp: "103.48.12.16", actionIp: "103.48.12.16", time: "2026-05-07 12:36:19", date: "2026-05-07", result: "成功" }
    ];

    const table = document.querySelector("[data-log-table]");
    const total = document.querySelector("[data-log-total]");
    const adminInput = document.querySelector("[data-log-admin]");
    const typeSelect = document.querySelector("[data-log-type]");
    const moduleSelect = document.querySelector("[data-log-module]");
    const ipInput = document.querySelector("[data-log-ip]");
    const fromInput = document.querySelector("[data-log-from]");
    const toInput = document.querySelector("[data-log-to]");

    function typeBadge(type) {
      const className = type === "修改" || type === "启停" ? "warning" : type === "删除" ? "danger" : type === "登录" ? "info" : "success";
      return `<span class="operation-type ${className}">${type}</span>`;
    }

    function resultBadge(result) {
      return `<span class="operation-result ${result === "成功" ? "success" : "fail"}">${result}</span>`;
    }

    function filteredLogs() {
      const admin = adminInput.value.trim().toLowerCase();
      const ip = ipInput.value.trim();
      const from = fromInput.value;
      const to = toInput.value;
      return logs.filter((item) => {
        const matchesAdmin = !admin || item.admin.toLowerCase().includes(admin) || item.name.toLowerCase().includes(admin);
        const matchesType = !typeSelect.value || item.type === typeSelect.value;
        const matchesModule = !moduleSelect.value || item.module === moduleSelect.value;
        const matchesIp = !ip || item.loginIp.includes(ip) || item.actionIp.includes(ip);
        const matchesFrom = !from || item.date >= from;
        const matchesTo = !to || item.date <= to;
        return matchesAdmin && matchesType && matchesModule && matchesIp && matchesFrom && matchesTo;
      });
    }

    function renderLogs() {
      const rows = filteredLogs();
      table.querySelectorAll(".system-row.operation-log:not(.header)").forEach((row) => row.remove());
      rows.forEach((item) => {
        const row = document.createElement("div");
        row.className = "system-row operation-log";
        row.innerHTML = `<div><strong>${item.admin}</strong><span>${item.name}</span></div><div><span class="system-role-pill">${item.role}</span></div><div>${typeBadge(item.type)}</div><div>${item.module}</div><div>${item.target}</div><div class="operation-change">${item.change}</div><div>${item.loginIp}</div><div>${item.actionIp}</div><div><span class="profit-date">${item.time.replace(" ", "<br/>")}</span></div><div>${resultBadge(item.result)}</div>`;
        table.appendChild(row);
      });
      total.textContent = rows.length;
    }

    document.querySelector("[data-log-search]").addEventListener("click", renderLogs);
    document.querySelector("[data-log-reset]").addEventListener("click", () => {
      adminInput.value = "";
      typeSelect.value = "";
      moduleSelect.value = "";
      ipInput.value = "";
      fromInput.value = "2026-05-06";
      toInput.value = "2026-05-11";
      renderLogs();
    });
    document.querySelector("[data-export-log]").addEventListener("click", (event) => {
      event.currentTarget.textContent = "已导出";
      setTimeout(() => { event.currentTarget.textContent = "导出日志"; }, 1000);
    });
    [adminInput, ipInput].forEach((input) => {
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") renderLogs();
      });
    });
    [typeSelect, moduleSelect, fromInput, toInput].forEach((control) => control.addEventListener("change", renderLogs));

    renderLogs();
  </script>
</body>
</html>
