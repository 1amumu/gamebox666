<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏控制 - API ADMIN</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.8.4/dist/index.css" />
  <link rel="stylesheet" href="admin.css" />
  <style>
  </style>
</head>
<body>
  <div id="app" class="admin-layout">
    <script src="sidebar.js"></script>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="collapse-btn">☰</div>
          <div class="breadcrumb"><span>游戏配置</span><span>/</span><strong>游戏控制</strong></div>
        </div>
        <div class="topbar-right">
          <span class="top-icon">↻</span>
          <span class="top-icon">A</span>
          <span class="time" data-current-time></span>
          <el-select v-model="timezone" class="timezone" size="small">
            <el-option label="+05:30" value="+05:30" />
            <el-option label="+08:00" value="+08:00" />
            <el-option label="UTC" value="UTC" />
          </el-select>
          <span class="account">ar518888</span>
          <span class="top-icon">⌄</span>
        </div>
      </header>
      <section class="content">
        <h1 class="page-title">游戏控制</h1>
        <div class="page-subtitle">游戏配置 / 游戏控制</div>
        <div class="card">
      <h2 class="card-title">游戏控制</h2>
      <el-form ref="formRef" :model="form" :rules="rules" label-width="0" @submit.prevent>
        <div class="form-row">
          <div class="form-label"><span class="req">*</span>平台ID</div>
          <div class="form-body">
            <el-form-item prop="platformIds" style="margin-bottom: 0;">
              <el-input class="control-textarea" v-model="form.platformIds" type="textarea" :rows="4" placeholder="请输入平台ID，多个平台ID用英文逗号分隔" />
            </el-form-item>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">调控功能</div>
          <div class="form-body">
            <el-radio-group v-model="form.controlMode">
              <el-radio label="brand">按游戏品牌调控</el-radio>
              <el-radio label="game">按游戏调控</el-radio>
            </el-radio-group>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label"><span class="req">*</span>游戏品牌</div>
          <div class="form-body">
            <el-form-item prop="brandId" style="margin-bottom: 0;">
              <el-select class="control-select" v-model="form.brandId" placeholder="请选择游戏品牌" clearable>
                <el-option label="品牌 A" value="a" />
                <el-option label="品牌 B" value="b" />
                <el-option label="品牌 C" value="c" />
              </el-select>
            </el-form-item>
          </div>
        </div>
        <template v-if="form.releaseType !== 'rtp'">
          <div class="form-row">
            <div class="form-label">控制输赢</div>
            <div class="form-body">
              <el-radio-group v-model="form.winLoss">
                <el-radio-button label="loss">控输</el-radio-button>
                <el-radio-button label="win">控赢</el-radio-button>
              </el-radio-group>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">控制RTP</div>
            <div class="form-body rtp-wrap">
              <div class="rtp-gear-row">
                <el-input-number class="control-number" v-model="rtpGearValue" :min="rtpMin" :max="rtpMax" :step="1" controls-position="right" />
                <el-button size="small" @click="fillRtpQuick(form.rtpGear)">快速{{ rtpQuickVal(form.rtpGear) }}</el-button>
              </div>
              <el-radio-group class="control-radio-group" v-model="form.rtpGear">
                <el-radio-button label="low">低速</el-radio-button>
                <el-radio-button label="mid">中速</el-radio-button>
                <el-radio-button label="high">高速</el-radio-button>
              </el-radio-group>
              <div v-if="form.winLoss === 'loss'" class="hint">控输状态下，禁止RTP高于90</div>
              <div v-if="form.winLoss === 'win'" class="hint">控赢状态下，禁止RTP低于100</div>
            </div>
          </div>
        </template>
        <div class="form-row">
          <div class="form-label">解除类型</div>
          <div class="form-body">
            <el-radio-group v-model="form.releaseType">
              <el-radio label="amount">金额</el-radio>
              <el-radio label="rtp">RTP</el-radio>
              <el-radio label="time">时间</el-radio>
            </el-radio-group>
          </div>
        </div>
        <div v-if="form.releaseType === 'amount'" class="form-row">
          <div class="form-label"><span class="req">*</span>解除金额</div>
          <div class="form-body" style="display: flex; align-items: center; flex-wrap: wrap;">
            <el-form-item prop="releaseAmount" style="margin-bottom: 0;">
              <el-input-number class="control-number control-number-wide" v-model="releaseAmountValue" :step="1" :precision="2" controls-position="right" @change="onReleaseAmountChange" />
            </el-form-item>
            <span class="rounds-extra" style="margin-left: 8px;">累计达到该金额后，控制结束</span>
          </div>
        </div>
        <div v-else-if="form.releaseType === 'rtp'" class="form-row">
          <div class="form-label"><span class="req">*</span>解除RTP</div>
          <div class="form-body" style="display: flex; align-items: center; flex-wrap: wrap;">
            <el-form-item prop="releaseRtp" style="margin-bottom: 0;">
              <el-input-number class="control-number control-number-wide" v-model="form.releaseRtp" :min="0" :max="100" :step="0.1" :precision="1" controls-position="right" />
            </el-form-item>
            <span style="margin-left: 8px;">%</span>
            <span class="rounds-extra" style="margin-left: 8px;">达到该 RTP 后，控制结束</span>
          </div>
        </div>
        <div v-else-if="form.releaseType === 'time'" class="form-row">
          <div class="form-label"><span class="req">*</span>解除时间</div>
          <div class="form-body" style="display: flex; flex-direction: column; gap: 8px;">
            <el-form-item prop="releaseTimeKind" style="margin-bottom: 0;">
              <el-radio-group class="control-radio-group" v-model="form.releaseTimeKind">
                <el-radio-button label="d1">1天</el-radio-button>
                <el-radio-button label="d7">7天</el-radio-button>
                <el-radio-button label="d30">30天</el-radio-button>
                <el-radio-button label="d365">365天</el-radio-button>
                <el-radio-button label="forever">永久</el-radio-button>
              </el-radio-group>
            </el-form-item>
            <span class="rounds-extra">到达所选时间后，控制结束（永久无截止时间）</span>
          </div>
        </div>
        <div class="footer">
          <el-button @click="onCancel">取消</el-button>
          <el-button type="primary" @click="onSave">保存</el-button>
        </div>
      </el-form>
        </div>
      </section>
    </main>
  </div>
  <script src="https://unpkg.com/vue@3.4.38/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus@2.8.4/dist/index.full.min.js"></script>
  <script>
    const { createApp, reactive, ref, watch, computed } = Vue;
    const RTP_PRESET = {
      loss: { low: 90, mid: 80, high: 70 },
      win: { low: 100, mid: 150, high: 200 },
    };
    createApp({
      setup() {
        const timezone = ref("+05:30");
        const formRef = ref(null);
        const form = reactive({
          platformIds: "",
          controlMode: "brand",
          brandId: "",
          winLoss: "loss",
          rtpGear: "mid",
          rtpValueLow: 90,
          rtpValueMid: 80,
          rtpValueHigh: 70,
          releaseType: "amount",
          releaseAmount: -1,
          releaseRtp: 97,
          releaseTimeKind: "d1",
        });
        function applyRtpTierDefaults() {
          const p = RTP_PRESET[form.winLoss === "win" ? "win" : "loss"];
          form.rtpValueLow = p.low;
          form.rtpValueMid = p.mid;
          form.rtpValueHigh = p.high;
        }
        function rtpQuickVal(tier) {
          return RTP_PRESET[form.winLoss === "win" ? "win" : "loss"][tier];
        }
        function fillRtpQuick(tier) {
          const v = normalizeRtpValue(rtpQuickVal(tier));
          if (tier === "low") form.rtpValueLow = v;
          else if (tier === "mid") form.rtpValueMid = v;
          else form.rtpValueHigh = v;
        }
        const rtpMin = computed(() => (form.winLoss === "win" ? 100 : 0));
        const rtpMax = computed(() => (form.winLoss === "loss" ? 90 : 500));
        function normalizeRtpValue(v) {
          if (v === null || v === undefined || v === "") return v;
          if (form.winLoss === "loss" && v > 90) return 90;
          if (form.winLoss === "win" && v < 100) return 100;
          return v;
        }
        function syncRtpValues() {
          form.rtpValueLow = normalizeRtpValue(form.rtpValueLow);
          form.rtpValueMid = normalizeRtpValue(form.rtpValueMid);
          form.rtpValueHigh = normalizeRtpValue(form.rtpValueHigh);
        }
        const rtpGearValue = computed({
          get() {
            if (form.rtpGear === "low") return form.rtpValueLow;
            if (form.rtpGear === "mid") return form.rtpValueMid;
            return form.rtpValueHigh;
          },
          set(v) {
            const value = normalizeRtpValue(v);
            if (form.rtpGear === "low") form.rtpValueLow = value;
            else if (form.rtpGear === "mid") form.rtpValueMid = value;
            else form.rtpValueHigh = value;
          },
        });
        const releaseAmountValue = computed({
          get() {
            return form.releaseAmount;
          },
          set(v) {
            if (v === null || v === undefined || v === "") {
              form.releaseAmount = v;
              return;
            }
            if (form.winLoss === "loss") form.releaseAmount = -Math.abs(v);
            else form.releaseAmount = Math.abs(v);
          },
        });
        function syncReleaseAmountSign() {
          if (form.releaseType !== "amount") return;
          const v = form.releaseAmount;
          if (form.winLoss === "loss") {
            if (v === null || v === undefined || v === "" || v >= 0) form.releaseAmount = typeof v === "number" && v > 0 ? -v : -1;
          } else if (form.winLoss === "win" && v !== null && v !== undefined && v < 0) {
            form.releaseAmount = Math.abs(v) || 1;
          }
        }
        function onReleaseAmountChange() {
          if (form.releaseType !== "amount") return;
          if (form.winLoss === "loss" && form.releaseAmount > 0) form.releaseAmount = -form.releaseAmount;
          if (form.winLoss === "win" && form.releaseAmount < 0) form.releaseAmount = Math.abs(form.releaseAmount);
        }
        watch(
          () => form.releaseType,
          (t) => {
            if (t === "amount") syncReleaseAmountSign();
          }
        );
        watch(
          () => form.winLoss,
          () => {
            if (form.releaseType === "amount") syncReleaseAmountSign();
            applyRtpTierDefaults();
            syncRtpValues();
          }
        );
        const rules = {
          platformIds: [{ required: true, message: "维护中请输入", trigger: "blur" }],
          brandId: [{ required: true, message: "请选择", trigger: "change" }],
          releaseAmount: [
            {
              validator(_, v, cb) {
                if (form.releaseType !== "amount") return cb();
                if (v === null || v === undefined || v === "") return cb(new Error("请输入解除金额"));
                cb();
              },
              trigger: "change",
            },
          ],
          releaseRtp: [
            {
              validator(_, v, cb) {
                if (form.releaseType !== "rtp") return cb();
                if (v === null || v === undefined) return cb(new Error("请输入解除RTP"));
                cb();
              },
              trigger: "change",
            },
          ],
          releaseTimeKind: [
            {
              validator(_, v, cb) {
                if (form.releaseType !== "time") return cb();
                if (!v) return cb(new Error("请选择解除时间"));
                cb();
              },
              trigger: "change",
            },
          ],
        };
        function onCancel() {
          formRef.value?.resetFields();
          form.controlMode = "brand";
          form.winLoss = "loss";
          form.rtpGear = "mid";
          applyRtpTierDefaults();
          form.releaseType = "amount";
          form.releaseAmount = -1;
          form.releaseRtp = 97;
          form.releaseTimeKind = "d1";
        }
        function onSave() {
          formRef.value?.validate((ok) => {
            if (ok) ElementPlus.ElMessage.success("已保存");
          });
        }
        return { timezone, formRef, form, rules, rtpGearValue, rtpMin, rtpMax, releaseAmountValue, rtpQuickVal, fillRtpQuick, onReleaseAmountChange, onCancel, onSave };
      },
    }).use(ElementPlus).mount("#app");
  </script>
  <script src="common.js"></script>
</body>
</html>
