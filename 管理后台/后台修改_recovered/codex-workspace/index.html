<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex 工作台</title>
    <link rel="stylesheet" href="assets/workbench.css">
  </head>
  <body>
    <main class="workbench-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>后台页面</h1>
          <span id="pageCount">加载中</span>
        </div>
        <label class="search">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="页面名称或文件名">
        </label>
        <nav id="pageNav" class="page-nav" aria-label="页面列表"></nav>
      </aside>

      <section class="preview">
        <header class="preview-header">
          <div>
            <h2 id="previewTitle">选择页面</h2>
            <p id="previewMeta">从左侧选择一个页面进行预览。</p>
          </div>
          <a id="openRaw" class="open-raw" href="../首页仪表盘.html" target="_blank" rel="noreferrer">新窗口打开</a>
        </header>
        <div class="preview-frame-wrap">
          <iframe id="previewFrame" title="页面预览" src="../首页仪表盘.html"></iframe>
        </div>
      </section>
    </main>

    <script src="assets/workbench.js"></script>
  </body>
</html>
