<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日报告 - API ADMIN</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.8.4/dist/index.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-layout">
    <script src="sidebar.js"></script>
    <main class="main">
      <header class="topbar"><div class="topbar-left"><div class="collapse-btn">☰</div><div class="breadcrumb"><span>游戏数据</span><span>/</span><strong>每日报告</strong></div></div><div class="topbar-right"><span class="top-icon">↻</span><span class="top-icon">A</span><span class="time" data-current-time></span><select class="el-select__wrapper timezone"><option>+05:30</option><option>+08:00</option><option>UTC</option></select><span class="account">ar518888</span><span class="top-icon">⌄</span></div></header>
      <section class="content report-data-page">
        <div class="card report-card">
          <div class="report-toolbar report-toolbar-stacked">
            <div class="report-filter-grid daily-report-filters">
              <label class="report-filter">
                <span>游戏</span>
                <select class="report-control"><option>请选择</option><option>Avlator</option></select>
              </label>
              <label class="report-filter report-date-filter">
                <span>时间</span>
                <span class="report-date-range">
                  <input type="text" value="2026-05-07" aria-label="开始日期" readonly />
                  <em>-</em>
                  <input type="text" value="2026-05-07" aria-label="结束日期" readonly />
                </span>
              </label>
              <div class="report-periods">
                <button class="profit-btn primary" type="button">当日</button>
                <button class="profit-btn" type="button">当周</button>
                <button class="profit-btn" type="button">当月</button>
              </div>
              <div class="report-actions">
                <button class="profit-btn primary report-search-btn" type="button"><span class="report-search-icon"></span>查询</button>
                <button class="profit-btn" type="button">重置</button>
              </div>
            </div>
            <button class="profit-btn primary report-export-btn" type="button">导出</button>
          </div>
          <div class="report-table-wrap">
            <div class="report-table daily-report-table">
              <div class="report-row header">
                <div></div>
                <div><span class="help-dot">?</span>游戏名称</div>
                <div>日期</div>
                <div><span class="help-dot">?</span>游戏投注</div>
                <div><span class="help-dot">?</span>游戏返奖</div>
                <div><span class="help-dot">?</span>平台盈亏</div>
                <div><span class="help-dot">?</span>平台盈利率</div>
                <div>有效投注额</div>
                <div>有效投注比</div>
                <div><span class="help-dot">?</span>注单数</div>
                <div><span class="help-dot">?</span>投注人数</div>
              </div>
              <div class="report-row">
                <div class="report-expand">›</div>
                <div class="report-game-cell"><span class="report-game-thumb"></span><span>Avlator</span></div>
                <div>2026-05-07</div>
                <div class="profit-num">30,091,369.90</div>
                <div class="profit-num">29,269,958.56</div>
                <div class="profit-num neg">821,411.34</div>
                <div>2.73%</div>
                <div class="profit-num">28,799,497.22</div>
                <div>95.71%</div>
                <div class="profit-num">317,799</div>
                <div>5997</div>
              </div>
            </div>
          </div>
          <div class="profit-pagination report-pagination">
            <div>共 1 条</div>
            <div class="profit-page-size"><select class="profit-size-select"><option>20条/页</option></select></div>
            <div class="profit-pages"><div class="profit-page-btn disabled">‹</div><div class="profit-page-btn active">1</div><div class="profit-page-btn disabled">›</div></div>
            <div class="profit-page-jump"><span>前往</span><input class="profit-page-input" value="1" /><span>页</span></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="common.js"></script>
</body>
</html>
