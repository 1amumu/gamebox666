<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏留存 - API ADMIN</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.8.4/dist/index.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-layout">
    <script src="sidebar.js"></script>
    <main class="main">
      <header class="topbar"><div class="topbar-left"><div class="collapse-btn">☰</div><div class="breadcrumb"><span>数据统计</span><span>/</span><strong>游戏留存</strong></div></div><div class="topbar-right"><span class="top-icon">↻</span><span class="top-icon">A</span><span class="time" data-current-time></span><select class="el-select__wrapper timezone"><option>+05:30</option><option>+08:00</option><option>UTC</option></select><span class="account">ar518888</span><span class="top-icon">⌄</span></div></header>
      <section class="content stats-page">
        <div class="card stats-card">
          <div class="stats-toolbar"><label class="stats-filter"><span>游戏</span><select class="stats-input"><option>请选择</option><option>Avlator</option></select></label><label class="stats-filter"><span>时间</span><input class="stats-input" type="date" value="2026-05-07" /></label><button class="profit-btn primary" type="button">查询</button><button class="profit-btn" type="button">重置</button></div>
          <div class="stats-table-wrap"><div class="stats-table retention"><div class="stats-row header"><div>游戏名称</div><div>日期ID</div><div>新用户数</div><div>下注用户数</div><div>次日留存率</div><div>3日留存率</div><div>7日留存率</div><div>14日留存率</div><div>30日留存率</div></div><div class="stats-row"><div><span class="game-name-cell"><span class="game-avatar"></span>Avlator</span></div><div>2026-05-07</div><div class="profit-num">3,286</div><div class="profit-num">2,941</div><div>86.08%</div><div>41.61%</div><div>80.65%</div><div>111.47%</div><div>36.97%</div></div></div></div>
          <div class="profit-pagination"><div>共 1 条</div><div class="profit-page-size"><select class="profit-size-select"><option>20条/页</option></select></div><div class="profit-pages"><div class="profit-page-btn">‹</div><div class="profit-page-btn active">1</div><div class="profit-page-btn">›</div></div><div class="profit-page-jump"><span>前往</span><input class="profit-page-input" value="1" /><span>页</span></div></div>
        </div>
      </section>
    </main>
  </div>
  <script src="common.js"></script>
</body>
</html>
