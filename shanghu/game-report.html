<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏数据 - API ADMIN</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.8.4/dist/index.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-layout">
    <script src="sidebar.js"></script>
    <main class="main">
      <header class="topbar"><div class="topbar-left"><div class="collapse-btn">☰</div><div class="breadcrumb"><strong>游戏数据</strong></div></div><div class="topbar-right"><span class="top-icon">↻</span><span class="top-icon">A</span><span class="time" data-current-time></span><select class="el-select__wrapper timezone"><option>+05:30</option><option>+08:00</option><option>UTC</option></select><span class="account">ar518888</span><span class="top-icon">⌄</span></div></header>
      <section class="content report-data-page">
        <div class="card report-card">
          <div class="report-toolbar report-toolbar-inline">
            <div class="report-filter-line">
              <label class="report-filter report-date-filter">
                <span>时间</span>
                <span class="report-date-range">
                  <input type="text" value="2026-05-07" aria-label="开始日期" readonly />
                  <em>-</em>
                  <input type="text" value="2026-05-07" aria-label="结束日期" readonly />
                </span>
              </label>
              <button class="profit-btn primary report-search-btn" type="button"><span class="report-search-icon"></span>查询</button>
            </div>
            <button class="profit-btn primary report-export-btn" type="button">导出</button>
          </div>
          <div class="report-table-wrap">
            <div class="report-table game-data-table">
              <div class="report-row header">
                <div><span class="help-dot">?</span>游戏名称</div>
                <div><span class="help-dot">?</span>类型</div>
                <div><span class="help-dot">?</span>玩家总投注</div>
                <div><span class="help-dot">?</span>玩家总返奖</div>
                <div><span class="help-dot">?</span>玩家总输赢</div>
                <div><span class="help-dot">?</span>注单数</div>
              </div>
              <div class="report-row">
                <div class="report-game-cell"><span class="report-game-thumb"></span><span>Avlator</span></div>
                <div>MiniGame</div>
                <div class="profit-num">30,041,199.64</div>
                <div class="profit-num">29,230,246.19</div>
                <div class="profit-num pos">-810,953.45</div>
                <div class="profit-num">317,352</div>
              </div>
            </div>
          </div>
          <div class="profit-pagination report-pagination">
            <div>共 1 条</div>
            <div class="profit-page-size"><select class="profit-size-select"><option>20条/页</option></select></div>
            <div class="profit-pages"><div class="profit-page-btn disabled">‹</div><div class="profit-page-btn active">1</div><div class="profit-page-btn disabled">›</div></div>
            <div class="profit-page-jump"><span>前往</span><input class="profit-page-input" value="1" /><span>页</span></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="common.js"></script>
</body>
</html>
