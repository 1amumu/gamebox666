<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台入口</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #18212f;
        --muted: #667085;
        --line: #d9e2f0;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --secondary: #0f172a;
        --secondary-hover: #1e293b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        background: radial-gradient(circle at top, #ffffff 0%, #f4f7fb 48%, #e8eef8 100%);
        color: var(--text);
      }

      .shell {
        width: min(960px, 100%);
        padding: 40px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      }

      .header {
        margin-bottom: 32px;
      }

      .title {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.2;
      }

      .desc {
        margin: 0;
        font-size: 16px;
        line-height: 1.7;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
      }

      .entry {
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 24px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
      }

      .entry-tag {
        width: fit-content;
        padding: 6px 10px;
        border-radius: 999px;
        background: #eff6ff;
        color: var(--primary);
        font-size: 13px;
        font-weight: 600;
      }

      .entry-title {
        margin: 0;
        font-size: 24px;
      }

      .entry-text {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 156px;
        padding: 12px 18px;
        border-radius: 12px;
        color: #ffffff;
        text-decoration: none;
        font-size: 15px;
        font-weight: 600;
        transition: background-color 0.2s ease, transform 0.2s ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .button-primary {
        background: var(--primary);
      }

      .button-primary:hover {
        background: var(--primary-hover);
      }

      .button-secondary {
        background: var(--secondary);
      }

      .button-secondary:hover {
        background: var(--secondary-hover);
      }

      @media (max-width: 720px) {
        .shell {
          padding: 24px;
          border-radius: 16px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1 class="title">后台入口</h1>
        <p class="desc">请选择要进入的系统入口。这里仅作为根目录导航页，不会改动管理后台和商户后台内部页面。</p>
      </header>

      <section class="grid">
        <article class="entry">
          <span class="entry-tag">Admin</span>
          <h2 class="entry-title">管理后台</h2>
          <p class="entry-text">进入 `管理后台/index.html`。</p>
          <a class="button button-primary" href="./管理后台/index.html">进入管理后台</a>
        </article>

        <article class="entry">
          <span class="entry-tag">Merchant</span>
          <h2 class="entry-title">商户后台</h2>
          <p class="entry-text">进入 `商户后台/index.html`。</p>
          <a class="button button-secondary" href="./商户后台/index.html">进入商户后台</a>
        </article>
      </section>
    </main>
  </body>
</html>
